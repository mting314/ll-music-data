name: Refresh dataset

# Pulls the latest dataset from the Cloud Run data API once a day and commits the
# per-entity JSON files. GitHub Pages then serves them on its global CDN. Uses the
# built-in GITHUB_TOKEN to commit to this repo — no extra secrets.
on:
  schedule:
    - cron: '0 4 * * *' # 04:00 UTC, ~1h after the upstream Firestore refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch + split dataset into per-entity files
        env:
          DATA_API: https://ll-data-api-278890546984.us-central1.run.app/data
        run: |
          curl -sSf "$DATA_API" -o /tmp/data.json
          node -e '
            const fs = require("fs");
            const d = JSON.parse(fs.readFileSync("/tmp/data.json", "utf8"));
            // Refuse to publish a garbage/empty payload.
            if (!Array.isArray(d.songs) || d.songs.length === 0) {
              console.error("dataset has no songs — refusing to publish");
              process.exit(1);
            }
            const fields = ["songs","artists","discographies","seriesInfo","seriesNames","performances","setlists","build"];
            for (const f of fields) {
              const v = d[f] ?? (["seriesNames","setlists","build"].includes(f) ? {} : []);
              fs.writeFileSync(f + ".json", JSON.stringify(v));
            }
            console.log("songs:", d.songs.length, "generatedAt:", d.build?.generatedAt);
          '

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
